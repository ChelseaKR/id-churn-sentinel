# Publish the static site (dist/) to GitHub Pages.
#
# ── READ THIS BEFORE TRUSTING IT ─────────────────────────────────────────────────────────
# This workflow is a CONVENIENCE, not the mechanism. Two reasons, and both are load-bearing:
#
#   1. This repository's owner has an account-wide GitHub Actions spending limit, and this
#      workflow is exactly the sort of thing it stops. **Do not assume it ever runs.**
#   2. `dist/` is COMMITTED (see .gitignore, which explains why at length). The published
#      site is therefore already in the repository, self-contained, with no build step: it
#      can be served by GitHub Pages straight from the branch, by any static host, by a
#      Netlify drop, or by `python -m http.server` in a clean clone. If this workflow never
#      runs, the site still exists and is still correct.
#
# A feed that only exists once somebody else's billing system agrees to run a job is a feed
# that does not exist. The same reasoning governs .github/workflows/watch.yml.
#
# ── WHAT IT CANNOT DO ────────────────────────────────────────────────────────────────────
# It cannot publish an unreviewed change, because it does not generate anything: it uploads
# `dist/` exactly as committed, and `dist/` can only be written by `sentinel publish`, which
# emits confirmed, human-reviewed records only (`make no-unreviewed-in-feed`). There is no
# path from this workflow to `sentinel review --reviewer`, and there never will be.
name: pages

on:
  push:
    branches: [main]
    paths:
      - "dist/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Read the repo, publish the pages. That is the whole blast radius.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false # never interrupt a publish half-written

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # A guard, not a formality. The published site is the one artifact that reaches
      # organizations who act on it, so the merge-blocking safety gate runs again here,
      # against the bytes that are about to go out — not against the bytes someone tested
      # locally three commits ago.
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install
        run: make install

      - name: Re-assert the safety gate on the bytes being published
        run: |
          make no-unreviewed-in-feed
          make sources-validate

      - uses: actions/configure-pages@v5

      - name: Upload dist/ exactly as committed
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deploy
        uses: actions/deploy-pages@v4
